limit_req_zone $binary_remote_addr zone=upload_zone:10m rate=3r/m;
limit_req_zone $binary_remote_addr zone=status_zone:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=global_zone:10m  rate=60r/m;
limit_req_status 429;

server {
    listen 80;

    # Must be at least as large as the largest allowed upload (video: 2 GB).
    client_max_body_size 2200M;

    root /usr/share/nginx/html;
    index index.html;

    location /api/files/upload {
        limit_req zone=upload_zone burst=3 nodelay;

        proxy_pass http://backend:8000/files/upload;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_request_buffering off;
        proxy_buffering off;

        proxy_http_version 1.1;
        proxy_connect_timeout 10s;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
    }

    location ~ ^/api/(files/[^/]+/status)$ {
        limit_req zone=status_zone burst=10 nodelay;

        proxy_pass http://backend:8000/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    location /api/ {
        limit_req zone=global_zone burst=20 nodelay;

        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_request_buffering off;
        proxy_buffering off;

        proxy_http_version 1.1;
        proxy_connect_timeout 10s;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}