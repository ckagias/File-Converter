server {
    listen 80;

    # Must be at least as large as the largest allowed upload (video: 2 GB).
    client_max_body_size 2200M;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Disable NGINX upload buffering so the request body streams straight to FastAPI rather than being held in NGINX memory first.
        # Without this, a 2 GB upload occupies 2 GB in NGINX before FastAPI even starts writing to disk.
        proxy_request_buffering off;

        # Disable response buffering so FileResponse streams straight to the client rather than accumulating in NGINX memory.
        proxy_buffering off;

        proxy_http_version 1.1;
        proxy_connect_timeout 10s;
        # Allow enough time for large uploads and long conversions.
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}